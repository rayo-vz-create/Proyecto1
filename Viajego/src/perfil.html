<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | ViajeGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger border-opacity-25 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold fst-italic" href="index.html">
                <i class="fas fa-paper-plane text-danger me-2"></i>Viaje<span class="text-danger">GO</span>
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill">Volver al Inicio</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card bg-dark border-secondary shadow-lg">
                    <div class="card-header bg-black border-secondary text-center py-4">
                        <i class="fas fa-user-circle fa-5x text-danger mb-3"></i>
                        <h3 id="perfil-nombre-header">Cargando...</h3>
                        <span class="badge bg-danger" id="perfil-rol">Usuario</span>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label class="text-secondary small">Nombre Completo / Comercial</label>
                            <p class="fs-5 border-bottom border-secondary pb-2" id="perfil-nombre">-</p>
                        </div>
                        <div class="mb-3">
                            <label class="text-secondary small">Correo Electrónico</label>
                            <p class="fs-5 border-bottom border-secondary pb-2" id="perfil-email">-</p>
                        </div>
                        <div class="mb-4">
                            <label class="text-secondary small">ID de Usuario</label>
                            <p class="fs-6 text-secondary" id="perfil-id">#000</p>
                        </div>
                        <button onclick="logout()" class="btn btn-danger w-100 fw-bold">
                            <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="mt-4 p-3 border border-secondary rounded bg-black">
    <h5 class="text-danger"><i class="fas fa-shield-alt me-2"></i>Seguridad Extra</h5>
    <p class="small text-secondary">Protege tu cuenta con Google Authenticator.</p>
    <button id="btn-activar-2fa" class="btn btn-sm btn-outline-warning w-100">
        Configurar Doble Autenticación
    </button>
</div>

<div class="modal fade" id="modalQR" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-danger">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Escanea el Código QR</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p class="small">Abre Google Authenticator en tu celular y escanea este código:</p>
                <img id="img-qr" src="" alt="QR Code" class="img-fluid mb-3 border p-2 bg-white">
                <div class="alert alert-info py-2 small">
                    <b>Llave manual:</b> <span id="manual-key"></span>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-danger w-100" data-bs-dismiss="modal">Ya lo escaneé</button>
            </div>
        </div>
    </div>
</div>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Lógica simple para esta página
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(userStr);
            
            // Llenar los campos con la información del localStorage
            document.getElementById('perfil-nombre-header').innerText = user.nombre || user.nombre_comercial;
            document.getElementById('perfil-nombre').innerText = user.nombre || user.nombre_comercial;
            document.getElementById('perfil-email').innerText = user.email || 'No registrado';
            document.getElementById('perfil-rol').innerText = user.rol.toUpperCase();
            document.getElementById('perfil-id').innerText = `ID Cliente: ${user.id}`;
        });
        
        document.getElementById('btn-activar-2fa').addEventListener('click', async () => {
    const userStr = localStorage.getItem('user');
    if (!userStr) return alert("Sesión no encontrada");
    const user = JSON.parse(userStr);
    
    // Al estar en el puerto 80, usamos la ruta directa que Nginx ya conoce
    const API_URL = '/api/generate-2fa';

    console.log("Conectando a través del Load Balancer en el puerto 80...");

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: user.id })
        });

        if (!response.ok) throw new Error(`Error ${response.status}`);

        const data = await response.json();
        
        if (data.qr_code) {
            document.getElementById('img-qr').src = data.qr_code;
            document.getElementById('manual-key').innerText = data.secret;
            const myModal = new bootstrap.Modal(document.getElementById('modalQR'));
            myModal.show();
        }
    } catch (error) {
        console.error("Error detallado:", error);
        alert("Error: No se pudo conectar con el servidor. Revisa los logs de Nginx.");
    }
});
        

    </script>
</body>
</html>
