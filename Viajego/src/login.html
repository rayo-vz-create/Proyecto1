<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | ViajeGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #1a0505 100%);
        }

        /* Estilo para el cursor del ojo */
        .password-toggle {
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-danger border-opacity-25 fade-in-up"
                    style="background-color: #121212;">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-paper-plane fa-3x text-danger mb-3"></i>
                            <h2 class="fw-bold text-white">Bienvenido</h2>
                            <p class="text-secondary small">Ingresa a tu cuenta ViajeGO</p>
                        </div>

                        <form id="login-form">
                            <div class="form-floating mb-3">
                                <input type="email"
                                    class="form-control border-secondary focus-ring focus-ring-danger bg-black text-white"
                                    id="email" placeholder="name@example.com" required>
                                <label for="email" class="text-secondary">Correo Electrónico</label>
                            </div>

                            <div class="form-floating mb-4 position-relative">
                                <input type="password"
                                    class="form-control border-secondary focus-ring focus-ring-danger bg-black text-white"
                                    id="password" placeholder="Password" required style="padding-right: 40px;">
                                <label for="password" class="text-secondary">Contraseña</label>

                                <span class="position-absolute top-50 end-0 translate-middle-y me-3 password-toggle"
                                    onclick="togglePassword('password', this)">
                                    <i class="fas fa-eye text-secondary"></i>
                                </span>
                            </div>

                            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold shadow-sm mb-3">
                                INICIAR SESIÓN <i class="fas fa-arrow-right ms-2"></i>
                            </button>
                        </form>

                        <div id="2fa-section" style="display: none;">
                            <h5 class="text-warning text-center mt-3">Seguridad 2FA</h5>
                            <p class="small text-center">Introduce el código de tu aplicación Authenticator</p>
                            <input type="text" id="otp_code" class="form-control text-center fs-2" placeholder="000000"
                                maxlength="6">
                            <button id="btn-verify-otp" class="btn btn-warning w-100 mt-3">Verificar e Ingresar</button>
                        </div>


                        <div class="text-center mt-4">
                            <p class="text-muted small mb-1">¿No tienes cuenta?</p>
                            <a href="registro.html" class="text-danger fw-bold text-decoration-none">Regístrate aquí</a>
                            <div class="mt-3">
                                <a href="index.html" class="text-secondary small text-decoration-none hover-white">
                                    <i class="fas fa-arrow-left me-1"></i> Volver al Inicio
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Variable global para guardar el ID durante el proceso de 2FA
        let tempUserId = null;

        // --- FUNCIÓN PARA VER CONTRASEÑA ---
        function togglePassword(inputId, spanElement) {
            const input = document.getElementById(inputId);
            const icon = spanElement.querySelector('i');

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                icon.classList.add('text-danger');
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                icon.classList.remove('text-danger');
            }
        }

        // --- PASO 1: LOGIN INICIAL ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    if (data.requires_2fa) {
                        // Si el servidor dice que requiere 2FA:
                        // 1. Guardamos el ID del usuario que devolvió el backend
                        tempUserId = data.user_id;
                        // 2. Ocultamos el formulario de login
                        document.getElementById('login-form').style.display = 'none';
                        // 3. Mostramos la sección para el código de 6 dígitos
                        document.getElementById('2fa-section').style.display = 'block';
                    } else {
                        // Si NO tiene 2FA activado, entra directo
                        finalizarLogin(data.user);
                    }
                } else {
                    alert(data.message);
                }
            } catch (err) {
                console.error(err);
                alert('Error de conexión con el servidor');
            }
        });

        // --- PASO 2: VERIFICACIÓN DE CÓDIGO TOTP ---
        document.getElementById('btn-verify-otp').addEventListener('click', async () => {
            const otp_code = document.getElementById('otp_code').value;

            if (otp_code.length !== 6) {
                alert("Por favor, ingresa los 6 dígitos de tu app.");
                return;
            }

            try {
                const res = await fetch('/api/verify-2fa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: tempUserId, 
                        otp_code: otp_code 
                    })
                });

                const data = await res.json();

                if (data.success) {
                    // Si el código es correcto, el servidor devuelve los datos del usuario
                    finalizarLogin(data.user);
                } else {
                    alert(data.message || "Código incorrecto o expirado.");
                }
            } catch (err) {
                alert("Error al verificar el código de seguridad.");
            }
        });

        // --- FUNCIÓN PARA GUARDAR SESIÓN Y REDIRECCIONAR ---
        function finalizarLogin(user) {
            localStorage.setItem('user', JSON.stringify(user));

            // Redirección según el rol del usuario
            if (user.rol === 'admin') {
                window.location.href = 'adminPanel.html';
            } else if (user.rol === 'agencia') {
                window.location.href = 'servicesPanel.html';
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
